<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 890 340" width="100%" height="auto" style="background:#09090b; border-radius:12px; border:1px solid rgba(255,255,255,0.08); font-family:system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#71717a" />
    </marker>
    
    <!-- Outer Card Glow Gradients -->
    <linearGradient id="glow-interfaces" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="glow-control" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="glow-intelligence" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#047857" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="glow-providers" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0.2" />
    </linearGradient>
    
    <!-- Box Inner Gradient -->
    <linearGradient id="box-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#0f0f11" />
    </linearGradient>
  </defs>

  <!-- Row Header Titles -->
  <text x="20" y="32" fill="#71717a" font-size="11" font-weight="800" letter-spacing="1.5">USER INTERFACES</text>
  <text x="230" y="32" fill="#71717a" font-size="11" font-weight="800" letter-spacing="1.5">CONTROL &amp; STATE</text>
  <text x="440" y="32" fill="#71717a" font-size="11" font-weight="800" letter-spacing="1.5">INTELLIGENCE LAYER</text>
  <text x="690" y="32" fill="#71717a" font-size="11" font-weight="800" letter-spacing="1.5">LLM PROVIDERS</text>

  <!-- Column 1: Interfaces (Blue accent) -->
  <rect x="20" y="50" width="180" height="260" rx="12" fill="url(#box-grad)" stroke="url(#glow-interfaces)" stroke-width="1.5" />
  <text x="110" y="80" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">Interactive UIs</text>
  
  <rect x="35" y="105" width="150" height="36" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.05)" />
  <text x="110" y="127" fill="#e4e4e7" font-size="11" font-weight="600" text-anchor="middle">Terminal CLI</text>
  <text x="110" y="137" fill="#71717a" font-size="8" text-anchor="middle">Commander / Inquirer</text>

  <rect x="35" y="155" width="150" height="36" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.05)" />
  <text x="110" y="177" fill="#e4e4e7" font-size="11" font-weight="600" text-anchor="middle">Web Dashboard</text>
  <text x="110" y="187" fill="#71717a" font-size="8" text-anchor="middle">Local browser analytics</text>

  <rect x="35" y="205" width="150" height="36" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.05)" />
  <text x="110" y="227" fill="#e4e4e7" font-size="11" font-weight="600" text-anchor="middle">Web Speech APIs</text>
  <text x="110" y="237" fill="#71717a" font-size="8" text-anchor="middle">Browser-native STT &amp; TTS</text>

  <!-- Column 2: Control & State (Purple accent) -->
  <rect x="230" y="50" width="180" height="260" rx="12" fill="url(#box-grad)" stroke="url(#glow-control)" stroke-width="1.5" />
  <text x="320" y="80" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">App Backend</text>

  <rect x="245" y="105" width="150" height="36" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.05)" />
  <text x="320" y="127" fill="#e4e4e7" font-size="11" font-weight="600" text-anchor="middle">Express Server</text>
  <text x="320" y="137" fill="#71717a" font-size="8" text-anchor="middle">REST endpoints / API</text>

  <rect x="245" y="155" width="150" height="36" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.05)" />
  <text x="320" y="177" fill="#e4e4e7" font-size="11" font-weight="600" text-anchor="middle">Session Manager</text>
  <text x="320" y="187" fill="#71717a" font-size="8" text-anchor="middle">State &amp; prompt storage</text>

  <rect x="245" y="205" width="150" height="36" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.05)" />
  <text x="320" y="227" fill="#e4e4e7" font-size="11" font-weight="600" text-anchor="middle">Local Storage</text>
  <text x="320" y="237" fill="#71717a" font-size="8" text-anchor="middle">JSON config &amp; history</text>

  <!-- Column 3: Intelligence (Emerald/Teal accent) -->
  <rect x="440" y="50" width="220" height="260" rx="12" fill="url(#box-grad)" stroke="url(#glow-intelligence)" stroke-width="1.5" />
  <text x="550" y="80" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">Core Engine</text>

  <rect x="455" y="105" width="190" height="34" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.05)" />
  <text x="550" y="126" fill="#e4e4e7" font-size="10.5" font-weight="600" text-anchor="middle">Smart Context Builder</text>

  <rect x="455" y="147" width="190" height="34" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.05)" />
  <text x="550" y="168" fill="#e4e4e7" font-size="10.5" font-weight="600" text-anchor="middle">Question Generator</text>

  <rect x="455" y="189" width="190" height="34" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.05)" />
  <text x="550" y="210" fill="#e4e4e7" font-size="10.5" font-weight="600" text-anchor="middle">Answer Evaluator</text>

  <rect x="455" y="231" width="190" height="34" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.05)" />
  <text x="550" y="252" fill="#e4e4e7" font-size="10.5" font-weight="600" text-anchor="middle">Safety Guardrails</text>

  <!-- Column 4: Providers (Orange accent) -->
  <rect x="690" y="50" width="180" height="260" rx="12" fill="url(#box-grad)" stroke="url(#glow-providers)" stroke-width="1.5" />
  <text x="780" y="80" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">Agnostic LLM</text>

  <rect x="705" y="105" width="150" height="36" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.05)" />
  <text x="780" y="127" fill="#e4e4e7" font-size="11" font-weight="600" text-anchor="middle">LLM Wrapper (llm.js)</text>
  <text x="780" y="137" fill="#71717a" font-size="8" text-anchor="middle">Unified endpoint client</text>

  <rect x="705" y="155" width="150" height="36" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.05)" />
  <text x="780" y="177" fill="#e4e4e7" font-size="11" font-weight="600" text-anchor="middle">Cloud Providers</text>
  <text x="780" y="187" fill="#71717a" font-size="8" text-anchor="middle">OpenAI / Anthropic / Groq</text>

  <rect x="705" y="205" width="150" height="36" rx="6" fill="#27272a" stroke="rgba(255,255,255,0.05)" />
  <text x="780" y="227" fill="#e4e4e7" font-size="11" font-weight="600" text-anchor="middle">Local / Custom</text>
  <text x="780" y="237" fill="#71717a" font-size="8" text-anchor="middle">Ollama / Custom APIs</text>

  <!-- Connectors -->
  <line x1="200" y1="180" x2="222" y2="180" stroke="#71717a" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow)" />
  <line x1="410" y1="180" x2="432" y2="180" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="660" y1="180" x2="682" y2="180" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow)" />
</svg>
